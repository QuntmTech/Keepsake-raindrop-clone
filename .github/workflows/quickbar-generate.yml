name: Generate Quick Bar release

on:
  push:
    branches: [agent/quickbar-custom-dock]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[quickbar-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/quickbar-custom-dock
          fetch-depth: 0

      - name: Apply release patch
        run: python scripts/apply-quickbar-dock-release.py

      - name: Commit generated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: customizable Quick Bar dock [quickbar-generated]"
          git push origin HEAD:agent/quickbar-custom-dock
