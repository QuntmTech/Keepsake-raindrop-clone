name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  extension:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: agent/8.13.0-capture-studio-uhd
          fetch-depth: 0

      - name: Apply Capture Studio runtime upgrade
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply-813-capture-runtime.py 2>&1 | tee /tmp/generator.log

      - name: Commit generated source
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "feat: wire resilient UHD capture runtime"
            git push origin HEAD:agent/8.13.0-capture-studio-uhd
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check generated runtime
        shell: bash
        run: |
          set -o pipefail
          npm run compile 2>&1 | tee /tmp/compile.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepsake-813-generator-diagnostics
          path: |
            /tmp/generator.log
            /tmp/compile.log
          if-no-files-found: ignore
          retention-days: 7
