name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  extension:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: agent/8.12.1-resizable-performance
          fetch-depth: 0

      - name: Apply startup and UI polish
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/repair-8121-startup-generator.py
          python3 scripts/apply-8121-startup-polish.py 2>&1 | tee /tmp/generator.log

      - name: Commit generated source
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "perf: defer startup maintenance and coalesce UI refreshes"
            git push origin HEAD:agent/8.12.1-resizable-performance
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify and build
        run: |
          npm run check:version
          npm test
          npm run compile
          npm run build
          npm run check:bundle
          npm run zip:store

      - name: Upload unpacked Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: keepsake-chrome-unpacked
          path: .output/chrome-mv3/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepsake-ci-diagnostics
          path: /tmp/generator.log
          if-no-files-found: ignore
          retention-days: 7
