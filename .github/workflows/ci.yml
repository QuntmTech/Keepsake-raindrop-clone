name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  extension:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        shell: bash
        run: |
          set -o pipefail
          npm run check:version 2>&1 | tee /tmp/version.log

      - name: Test retrieval behavior
        shell: bash
        run: |
          set -o pipefail
          npm run test:retrieval 2>&1 | tee /tmp/retrieval-tests.log

      - name: Type-check
        shell: bash
        run: |
          set -o pipefail
          npm run compile 2>&1 | tee /tmp/compile.log

      - name: Build extension
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build.log

      - name: Build Chrome Web Store ZIP
        shell: bash
        run: |
          set -o pipefail
          npm run zip:store 2>&1 | tee /tmp/store-zip.log

      - name: Verify store manifest
        shell: bash
        run: |
          set -euo pipefail
          ZIP="$(find .output -maxdepth 1 -type f -name '*.zip' | head -n 1)"
          test -n "$ZIP"
          MANIFEST_PATH="$(unzip -Z1 "$ZIP" | grep -E '(^|/)manifest\.json$' | head -n 1)"
          test -n "$MANIFEST_PATH"
          unzip -p "$ZIP" "$MANIFEST_PATH" > /tmp/keepsake-manifest.json
          node --input-type=module <<'NODE' 2>&1 | tee /tmp/store-verify.log
          import { readFile } from 'node:fs/promises';
          const manifest = JSON.parse(await readFile('/tmp/keepsake-manifest.json', 'utf8'));
          const pkg = JSON.parse(await readFile('package.json', 'utf8'));
          if (manifest.key) throw new Error('Store ZIP still contains the development manifest key');
          if (manifest.version !== pkg.version) {
            throw new Error(`Store manifest version ${manifest.version} does not match package ${pkg.version}`);
          }
          console.log(`Store ZIP verified: version ${manifest.version}, no development key`);
          NODE

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keepsake-ci-diagnostics
          path: |
            /tmp/version.log
            /tmp/retrieval-tests.log
            /tmp/compile.log
            /tmp/build.log
            /tmp/store-zip.log
            /tmp/store-verify.log
            /tmp/keepsake-manifest.json
          if-no-files-found: ignore
          retention-days: 7
