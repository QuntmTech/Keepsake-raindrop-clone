          docs = '''# Keepsake 8.14 — visual rows and performance hardening\n\n- Quick Bar collection, search, and related-save rows now show compact visual thumbnails.\n- YouTube links derive a thumbnail without a paid API; other links fall back through cover, screenshot, favicon, and a deterministic letter tile.\n- Thumbnail requests are lazy, low-priority, and omit the page referrer.\n- The inline AI Writer selection bubble is now an explicit setting and defaults off for new installs.\n- The all-page content script starts at `document_idle`, debounces selection work, and avoids a MutationObserver when the Quick Bar is disabled.\n- Living Bookmarks no longer schedule a repeating alarm when no watches are enabled, and the offscreen parser opens only for due work.\n- Capture Studio throttles pointer-move redraws, releases discarded `ImageBitmap` resources, blocks unsafe giant clipboard PNGs, and matches download extensions to the real blob MIME type.\n\nThese are additive client changes only. No PocketBase schema change is required.\n'''
