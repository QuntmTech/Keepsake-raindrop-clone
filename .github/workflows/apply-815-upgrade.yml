name: Apply Keepsake 8.15 AI Reliability

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.head_ref == 'agent/8.15.0-ai-reliability-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out upgrade branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Reconstruct one-time upgrade
        run: |
          : > scripts/upgrade-815-once.mjs
          for part in scripts/.upgrade815/part-*.b64; do
            base64 --decode "$part" >> scripts/upgrade-815-once.mjs
          done
          node --check scripts/upgrade-815-once.mjs

      - name: Install exact dependencies
        run: npm ci

      - name: Materialize normal source files
        run: node scripts/upgrade-815-once.mjs

      - name: Stage intended source changes
        run: git add -A

      - name: Run complete regression suite
        run: npm test

      - name: Run TypeScript
        run: npm run compile

      - name: Build production extension
        run: npm run build

      - name: Enforce bundle budgets
        run: npm run check:bundle

      - name: Build Chrome Web Store ZIP
        run: npm run zip:store

      - name: Verify checks did not rewrite tracked source
        run: |
          git diff --exit-code
          git diff --cached --check

      - name: Commit validated 8.15 release source
        run: |
          git config user.name "Keepsake Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Release 8.15.0: harden AI reliability and safe rewriting"
          git push origin HEAD:${{ github.head_ref }}
