name: Materialize AI Action Runtime Fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ !contains(github.event.pull_request.title, '[ai-runtime-materialized]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/8.16-ai-action-runtime
          fetch-depth: 0

      - name: Apply runtime fix
        run: python scripts/materialize-ai-action-runtime-fix.py

      - name: Remove temporary materializer
        run: |
          rm scripts/materialize-ai-action-runtime-fix.py
          rm .github/workflows/materialize-ai-action-runtime-fix.yml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run focused runtime tests
        run: npm run test:ai-runtime-816

      - name: Type-check
        run: npm run compile

      - name: Build Chrome MV3 extension
        run: npm run build

      - name: Verify manifest
        run: |
          test -f .output/chrome-mv3/manifest.json
          node -e "const m=require('./.output/chrome-mv3/manifest.json'); if(m.manifest_version!==3 || m.version!=='8.16.0') process.exit(1); console.log('Verified Keepsake', m.version, 'Manifest V'+m.manifest_version)"

      - name: Commit verified source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add entrypoints/ai-embed.content.ts entrypoints/background.ts components/AIWriter.tsx scripts/test-ai-action-runtime-816.mjs package.json
          git add -u scripts/materialize-ai-action-runtime-fix.py .github/workflows/materialize-ai-action-runtime-fix.yml
          git commit -m "Fix 8.16 AI selection action runtime [ai-runtime-materialized]"
          git push origin HEAD:fix/8.16-ai-action-runtime
