name: Build clean Keepsake 8.14 branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: ${{ github.head_ref == 'agent/8.14.0-clean-performance-capture' && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract and run the transparent source patch
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/apply-clean-814.yml').read_text(encoding='utf-8')
          start = source.index("          python <<'PY'\n") + len("          python <<'PY'\n")
          end = source.index("\n          PY\n", start)
          body = source[start:end]
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in body.splitlines())
          Path('/tmp/apply-clean-814.py').write_text(body + '\n', encoding='utf-8')
          PY
          python /tmp/apply-clean-814.py

      - name: Make Home paint from cache before backend auth
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          def read(path):
              return Path(path).read_text(encoding='utf-8')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace_one(path, old, new):
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:120]!r}')
              write(path, text.replace(old, new, 1))

          replace_one(
              'lib/cache.ts',
              "export async function readSnapshot(uid: string | null): Promise<VaultSnapshot | null> {\n  if (!HOSTED || !uid) return null; // local mode is already instant\n  const s = await item.getValue();\n  return s && s.uid === uid ? s : null;\n}\n",
              "export async function readLastSnapshot(): Promise<VaultSnapshot | null> {\n  if (!HOSTED) return null;\n  return item.getValue();\n}\n\nexport async function readSnapshot(uid: string | null): Promise<VaultSnapshot | null> {\n  if (!HOSTED || !uid) return null; // local mode is already instant\n  const s = await readLastSnapshot();\n  return s && s.uid === uid ? s : null;\n}\n",
          )

          replace_one('hooks/useCollections.ts', "import { currentUser } from '@/lib/auth';\nimport { readSnapshot } from '@/lib/cache';", "import { readLastSnapshot } from '@/lib/cache';")
          replace_one(
              'hooks/useCollections.ts',
              "      const uid = (await currentUser())?.id ?? null;\n      const snap = await readSnapshot(uid);",
              "      const snap = await readLastSnapshot();",
          )

          replace_one('entrypoints/newtab/App.tsx', "import { currentUser } from '@/lib/auth';\nimport { readSnapshot, writeSnapshot } from '@/lib/cache';", "import { readLastSnapshot, writeSnapshot } from '@/lib/cache';")
          replace_one(
              'entrypoints/newtab/App.tsx',
              "    (async () => {\n      uidRef.current = (await currentUser())?.id ?? null;\n      const snap = await readSnapshot(uidRef.current);\n      if (snap && snap.bookmarks.length) setAll((cur) => (cur.length ? cur : snap.bookmarks));\n    })();",
              "    (async () => {\n      const snap = await readLastSnapshot();\n      if (!snap) return;\n      uidRef.current = snap.uid;\n      if (snap.bookmarks.length) setAll((cur) => (cur.length ? cur : snap.bookmarks));\n    })();",
          )

          # Fast local auth mirror: paint the signed-in shell from the last valid
          # local session while the full backend initializes and reconciles.
          replace_one('hooks/useAuth.ts', "import { useEffect, useState } from 'react';", "import { useEffect, useState } from 'react';\nimport { storage } from 'wxt/utils/storage';")
          replace_one(
              'hooks/useAuth.ts',
              "// Tiny auth hook shared by every UI surface. Backend-agnostic.\nexport function useAuth() {",
              "const cachedAuthMirror = storage.defineItem<string | null>('local:pb_auth', { fallback: null });\n\nfunction cachedUser(raw: string | null): { id: string; email: string; plan: Plan } | null {\n  if (!raw) return null;\n  try {\n    const parsed = JSON.parse(raw) as { token?: string; record?: { id?: string; email?: string; plan?: string } };\n    if (!parsed.token || !parsed.record?.id) return null;\n    const parts = parsed.token.split('.');\n    if (parts.length >= 2) {\n      try {\n        const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/'))) as { exp?: number };\n        if (payload.exp && payload.exp * 1000 <= Date.now()) return null;\n      } catch {\n        // PocketBase token shape can change; the backend remains authoritative.\n      }\n    }\n    const plan: Plan = parsed.record.plan === 'owner' || parsed.record.plan === 'pro' ? parsed.record.plan : 'free';\n    return { id: parsed.record.id, email: parsed.record.email ?? '', plan };\n  } catch {\n    return null;\n  }\n}\n\n// Tiny auth hook shared by every UI surface. Backend-agnostic.\nexport function useAuth() {",
          )
          replace_one(
              'hooks/useAuth.ts',
              "  useEffect(() => {\n    (async () => {\n      mark('init');\n      await loadAuth();\n      mark('auth');\n      const [loggedIn, u] = await Promise.all([isLoggedIn(), currentUser()]);\n      setAuthed(loggedIn);\n      setEmail(u?.email ?? null);\n      setPlan(u?.plan ?? 'free');\n      setReady(true);\n      mark('ready');\n    })();\n  }, []);",
              "  useEffect(() => {\n    let cancelled = false;\n    (async () => {\n      mark('init');\n      const cached = cachedUser(await cachedAuthMirror.getValue());\n      if (cached && !cancelled) {\n        setAuthed(true);\n        setEmail(cached.email);\n        setPlan(cached.plan);\n        setReady(true);\n        mark('ready:cache');\n      }\n\n      try {\n        await loadAuth();\n        mark('auth');\n        const [loggedIn, u] = await Promise.all([isLoggedIn(), currentUser()]);\n        if (cancelled) return;\n        setAuthed(loggedIn);\n        setEmail(u?.email ?? null);\n        setPlan(u?.plan ?? 'free');\n      } finally {\n        if (!cancelled) {\n          setReady(true);\n          mark('ready');\n        }\n      }\n    })();\n    return () => { cancelled = true; };\n  }, []);",
          )

          # Avoid StrictMode's development-only double mount in the packaged new
          # tab. It adds no production safety here and repeats startup effects.
          replace_one(
              'entrypoints/newtab/main.tsx',
              "ReactDOM.createRoot(document.getElementById('root')!).render(\n  <React.StrictMode>\n    <Providers>\n      <App />\n    </Providers>\n  </React.StrictMode>,\n);",
              "ReactDOM.createRoot(document.getElementById('root')!).render(\n  <Providers>\n    <App />\n  </Providers>,\n);",
          )

          test_path = Path('scripts/test-home-fast-814.mjs')
          test_path.write_text(r'''import test from 'node:test';
import assert from 'node:assert/strict';
import { readFile } from 'node:fs/promises';

const source = async (path) => readFile(new URL(`../${path}`, import.meta.url), 'utf8');

test('Home reads the last snapshot without waiting for backend auth', async () => {
  const [home, collections, cache] = await Promise.all([
    source('entrypoints/newtab/App.tsx'),
    source('hooks/useCollections.ts'),
    source('lib/cache.ts'),
  ]);
  assert.match(home, /readLastSnapshot/);
  assert.doesNotMatch(home, /currentUser\(\).*readSnapshot/s);
  assert.match(collections, /readLastSnapshot/);
  assert.doesNotMatch(collections, /currentUser/);
  assert.match(cache, /export async function readLastSnapshot/);
});

test('auth paints from the local mirror before backend reconciliation', async () => {
  const auth = await source('hooks/useAuth.ts');
  assert.match(auth, /cachedAuthMirror/);
  assert.match(auth, /mark\('ready:cache'\)/);
  assert.match(auth, /await loadAuth\(\)/);
});

test('new tab avoids development double-mount startup work', async () => {
  const main = await source('entrypoints/newtab/main.tsx');
  assert.doesNotMatch(main, /React\.StrictMode/);
});
''', encoding='utf-8')

          import json
          pkg_path = Path('package.json')
          pkg = json.loads(pkg_path.read_text(encoding='utf-8'))
          pkg['scripts']['test:home-fast-814'] = 'node --test scripts/test-home-fast-814.mjs'
          if 'npm run test:home-fast-814' not in pkg['scripts']['test']:
              pkg['scripts']['test'] += ' && npm run test:home-fast-814'
          pkg_path.write_text(json.dumps(pkg, indent=2) + '\n', encoding='utf-8')
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install and verify
        run: |
          npm ci
          npm test
          npm run compile
          npm run build
          npm run check:bundle

      - name: Commit normal source changes
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-clean-814.yml .github/workflows/run-clean-814-on-pr.yml .tmp/clean-814-trigger.txt
          git config user.name 'keepsake-release-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Release 8.14.0: faster Home, visual rows, and runtime hardening'
          git push origin HEAD:${{ github.head_ref }}
