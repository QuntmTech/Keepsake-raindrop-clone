name: Generate Quick Bar collection launcher

on:
  push:
    branches: [agent/8.10.5-instant-tooltips]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/8.10.5-instant-tooltips
          fetch-depth: 0

      - name: Apply collection launcher source changes
        run: node scripts/apply-collection-launcher.mjs

      - name: Commit generated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "feat: add Quick Bar collection launcher"
          git push origin HEAD:agent/8.10.5-instant-tooltips
