name: Finalize Keepsake 8.14

on:
  push:
    branches: [agent/8.14.0-clean-performance-capture]

permissions:
  contents: write

jobs:
  patch-and-clean:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/8.14.0-clean-performance-capture
          fetch-depth: 0

      - name: Apply compiler-safe PDF buffer fix
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          path = Path('entrypoints/studio/ImageEditor.tsx')
          text = path.read_text(encoding='utf-8')
          old = """  const chunks: Uint8Array[] = [];
          const offsets: number[] = [0];
          let length = 0;
          const push = (value: string | Uint8Array) => {
            const bytes = typeof value === 'string' ? encoder.encode(value) : value;
            chunks.push(bytes);
            length += bytes.length;
          };
          """
          new = """  const chunks: ArrayBuffer[] = [];
          const offsets: number[] = [0];
          let length = 0;
          const push = (value: string | Uint8Array) => {
            const bytes = typeof value === 'string' ? encoder.encode(value) : value;
            const copy = new Uint8Array(bytes.byteLength);
            copy.set(bytes);
            chunks.push(copy.buffer);
            length += copy.byteLength;
          };
          """
          if text.count(old) != 1:
              raise SystemExit('ImageEditor PDF buffer block did not match exactly')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          lock = Path('package-lock.json')
          lock_text = lock.read_text(encoding='utf-8')
          lock_text = lock_text.replace('"version": "7.0.0"', '"version": "8.14.0"', 2)
          lock.write_text(lock_text, encoding='utf-8')
          PY

      - name: Commit source and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-814-final.yml .tmp/fix-814-final-trigger.txt
          git config user.name 'keepsake-release-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: finalize compiler-safe exports and lockfile'
          git push origin HEAD:agent/8.14.0-clean-performance-capture
